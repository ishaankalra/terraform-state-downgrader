name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build binaries
        run: |
          # Build static binaries (no GLIBC dependency) for multiple platforms
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o terraform-state-downgrader-linux-amd64 -ldflags="-X 'main.Version=${{ steps.tag_version.outputs.new_tag }}' -s -w" .
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o terraform-state-downgrader-linux-arm64 -ldflags="-X 'main.Version=${{ steps.tag_version.outputs.new_tag }}' -s -w" .
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -o terraform-state-downgrader-darwin-amd64 -ldflags="-X 'main.Version=${{ steps.tag_version.outputs.new_tag }}' -s -w" .
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -o terraform-state-downgrader-darwin-arm64 -ldflags="-X 'main.Version=${{ steps.tag_version.outputs.new_tag }}' -s -w" .
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o terraform-state-downgrader-windows-amd64.exe -ldflags="-X 'main.Version=${{ steps.tag_version.outputs.new_tag }}' -s -w" .

          # Create checksums
          sha256sum terraform-state-downgrader-* > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}
          files: |
            terraform-state-downgrader-linux-amd64
            terraform-state-downgrader-linux-arm64
            terraform-state-downgrader-darwin-amd64
            terraform-state-downgrader-darwin-arm64
            terraform-state-downgrader-windows-amd64.exe
            checksums.txt